<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Jose Carhuachin</title>
    <link rel="stylesheet" href="css/styles_Contacto.css">
</head>
<body>

    <header>
        <h1>Contacto</h1>
        <p>¿Tienes un proyecto en mente? ¡Hablemos!</p>

    <section class="seccion-contacto">
        <div class="formulario-card">
            <h3>Llena todos los campos</h3>
            <form action="#">
                <div class="grupo">
                    <label>Nombre</label>
                    <input type="text" placeholder="Tu Nombre">
                </div>

                <div class="grupo">
                    <label>Teléfono</label>
                    <input type="tel" placeholder="Tu Teléfono">
                </div>

                <div class="grupo">
                    <label>Correo</label>
                    <input type="email" placeholder="Tu Email">
                </div>

                <div class="grupo">
                    <label>Mensaje</label>
                    <textarea placeholder="Escribe tu mensaje aquí..."></textarea>
                </div>

                <button type="submit" class="btn-enviar">Enviar</button>
            </form>
        </div>

        <div class="vinculos-contacto">
            <h3>Hablemos directamente</h3>
            
            <a href="https://wa.me/51938500836" target="_blank" class="link-card whatsapp">
                <div class="icono">📱</div>
                <div class="texto">
                    <span>WhatsApp</span>
                    <p>+51 938 500 836</p>
                </div>
            </a>

            <a href="mailto:josecarhuachin@gmail.com" class="link-card email">
                <div class="icono">✉️</div>
                <div class="texto">
                    <span>Correo Electrónico</span>
                    <p>josecarhuachin@gmail.com</p>
                </div>
            </a>
        </div>
    </section>

</body>
</html>
